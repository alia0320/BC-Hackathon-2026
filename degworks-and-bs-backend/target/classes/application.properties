# ===============================
# Server config
# ===============================
server.port=8080
spring.application.name=degworks-and-bs-backend

# ===============================
# Logging
# ===============================
logging.level.degworks-and-bs-backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# MySQL Datasource
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/degworks_db
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# Timezone (important for MySQL)
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=EST